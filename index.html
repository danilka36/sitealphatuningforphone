<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA GS MOBILE CONFIG</title>
    <style>
        :root {
            --bg-garage: #121110;      
            --panel-bg: rgba(25, 23, 22, 0.95); 
            --accent-dark: #fff;   
            --accent-coffee: #a89282; 
            --text-main: #e0d8d3;     
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Принудительно сбрасываем старый макет */
        body {
            background-color: var(--bg-garage) !important;
            color: var(--text-main) !important;
            min-height: 100vh !important;
            width: 100vw !important;
            display: flex !important;
            flex-direction: column !important;
            overflow-x: hidden !important;
            padding: 0 !important;
        }

        /* ВЕРХНЯЯ ЧАСТЬ ЭКРАНА С МОПЕДОМ */
        .mobile-top-stage {
            width: 100% !important;
            height: 35vh !important;
            background: #1a1817 !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 10px !important;
            border-bottom: 1px solid rgba(168, 146, 130, 0.2) !important;
        }

        .m-title h1 {
            font-size: 1.1em;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--accent-dark);
            text-align: center;
        }

        #display-engine-name {
            font-size: 0.75em;
            color: var(--accent-coffee);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        .m-images-box {
            position: relative;
            width: 100%;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .bike-layer {
            position: absolute;
            max-width: 85%;
            max-height: 100%;
            object-fit: contain;
        }
        #layer-body { z-index: 3; transition: filter 0.3s ease; }
        #layer-base { z-index: 2; }

        /* ОДНА ЕДИНСТВЕННАЯ ЛЕНТА ТЮНИНГА СНИЗУ */
        .mobile-bottom-scroll {
            width: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 15px !important;
            padding: 15px !important;
            background: var(--bg-garage) !important;
        }

        .m-block {
            width: 100% !important;
            background: var(--panel-bg);
            border: 1px solid rgba(168, 146, 130, 0.15);
            border-radius: 14px;
            padding: 12px;
        }

        .m-subtitle {
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-coffee);
            margin-bottom: 8px;
        }

        /* Горизонтальная прокрутка кнопок */
        .m-row-scroll {
            display: flex !important;
            gap: 8px !important;
            overflow-x: auto !important;
            padding-bottom: 6px !important;
        }

        .btn-tuning {
            flex: 0 0 auto !important;
            background: #1f1d1c;
            border: 1px solid rgba(168, 146, 130, 0.15);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8em;
            color: var(--text-main);
        }

        .btn-tuning.active {
            background: var(--accent-coffee) !important;
            color: #000 !important;
            border-color: var(--accent-coffee) !important;
        }

        .m-engine-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-engine {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1f1d1c;
            border: 1px solid rgba(168, 146, 130, 0.15);
            border-radius: 10px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.8em;
        }

        .btn-engine.active {
            background: var(--accent-coffee);
            color: #000;
        }

        .btn-color {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            margin-right: 10px;
        }
        .btn-color.active { border-color: #fff; }

        /* Статы */
        .stat-group { margin-bottom: 8px; }
        .stat-label-row { display: flex; justify-content: space-between; font-size: 0.75em; font-weight: 700; margin-bottom: 3px; text-transform: uppercase; }
        .stat-value { color: var(--accent-dark); font-weight: 800; }
        .bar-container { width: 100%; height: 5px; background: rgba(168, 146, 130, 0.1); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent-coffee); width: 50%; }
        .info-box { background: rgba(31, 29, 28, 0.6); border-radius: 8px; padding: 10px; font-size: 0.75em; line-height: 1.4; color: #c4b9b0; border-left: 3px solid var(--accent-coffee); }
    </style>
</head>
<body>

    <div class="mobile-top-stage">
        <div class="m-title">
            <h1>ALPHA GS GARAGE</h1>
            <div id="display-engine-name">Сток 125cc</div>
        </div>
        <div class="m-images-box">
            <img src="alpha_base.png" id="layer-base" class="bike-layer" alt="Base">
            <img src="alpha_body.png" id="layer-body" class="bike-layer" alt="Body">
        </div>
    </div>

    <div class="mobile-bottom-scroll">
        
        <div class="m-block">
            <div class="stat-group">
                <div class="stat-label-row"><div>Скорость</div><div class="stat-value" id="val-speed">~85 км/ч</div></div>
                <div class="bar-container"><div class="bar-fill" id="bar-speed"></div></div>
            </div>
            <div class="stat-group" style="margin-bottom: 10px;">
                <div class="stat-label-row"><div>Подрыв</div><div class="stat-value" id="val-torque">Средняя</div></div>
                <div class="bar-container"><div class="bar-fill" id="bar-torque"></div></div>
            </div>
            <div class="info-box" id="config-desc">Загрузка данных...</div>
        </div>

        <div class="m-block">
            <div class="m-subtitle">Цвет пластика и бака</div>
            <div style="display: flex;">
                <button class="btn-color active" style="background: #801818;" onclick="changeBodyColor('none', this)"></button>
                <button class="btn-color" style="background: #facc15;" onclick="changeBodyColor('hue-rotate(300deg) saturate(2.5) brightness(1.2)', this)"></button>
                <button class="btn-color" style="background: #1d4ed8;" onclick="changeBodyColor('hue-rotate(190deg) saturate(1.8)', this)"></button>
                <button class="btn-color" style="background: #1a1a1a;" onclick="changeBodyColor('grayscale(1) brightness(0.3)', this)"></button>
            </div>
        </div>

        <div class="m-block">
            <div class="m-subtitle">Выбор мотора</div>
            <div class="m-engine-list">
                <button class="btn-engine active" onclick="setEngine('stock_125', this)"><span>Сток 125cc</span></button>
                <button class="btn-engine" onclick="setEngine('zongshen_140', this)"><span>Zongshen 140cc</span></button>
                <button class="btn-engine" onclick="setEngine('daytona_140', this)"><span>Daytona 140cc</span></button>
                <button class="btn-engine" onclick="setEngine('zongshen_190', this)"><span>Zongshen 190cc</span></button>
                <button class="btn-engine" onclick="setEngine('daytona_190', this)"><span>Daytona 190cc</span></button>
            </div>
        </div>

        <div class="m-block">
            <div class="m-subtitle">Карбюратор</div>
            <div class="m-row-scroll">
                <button class="btn-tuning carb-btn active" onclick="setCarb(19)">PZ 19</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(22)">PZ 22</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(24)">PZ 24</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(26)">PZ 26</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(27)">PZ 27</button>
            </div>
        </div>

        <div class="m-block">
            <div class="m-subtitle">Ведущая звезда</div>
            <div class="m-row-scroll">
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(13)">13T</button>
                <button class="btn-tuning front-sprocket-btn active" onclick="setFrontSprocket(14)">14T</button>
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(15)">15T</button>
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(16)">16T</button>
            </div>
        </div>

        <div class="m-block">
            <div class="m-subtitle">Ведомая звезда</div>
            <div class="m-row-scroll">
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(36)">36T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(37)">37T</button>
                <button class="btn-tuning rear-sprocket-btn active" onclick="setRearSprocket(38)">38T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(39)">39T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(40)">40T</button>
            </div>
        </div>
    </div>

    <script>
        let currentEngine = 'stock_125'; let frontSprocket = 14; let rearSprocket = 38; let currentCarb = 19;
        const wrenchAudio = new Audio('гайковерт.MP3');
        function playWrenchSound() { wrenchAudio.currentTime = 0; wrenchAudio.play().catch(e => console.log(e)); }
        function changeBodyColor(f, el) { playWrenchSound(); document.getElementById('layer-body').style.filter = f; document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        function setEngine(type, el) { playWrenchSound(); currentEngine = type; document.querySelectorAll('.btn-engine').forEach(b => b.classList.remove('active')); el.classList.add('active'); document.getElementById('display-engine-name').innerText = type; recalculate(); }
        function setCarb(s) { playWrenchSound(); currentCarb = s; updateUI('.carb-btn', 'PZ ' + s); recalculate(); }
        function setFrontSprocket(t) { playWrenchSound(); frontSprocket = t; updateUI('.front-sprocket-btn', t + 'T'); recalculate(); }
        function setRearSprocket(t) { playWrenchSound(); rearSprocket = t; updateUI('.rear-sprocket-btn', t + 'T'); recalculate(); }
        function updateUI(c, txt) { document.querySelectorAll(c).forEach(b => { b.classList.remove('active'); if (b.innerText === txt) b.classList.add('active'); }); }
        function recalculate() {
            let speed = 85; let torque = 55; let txt = "";
            if (currentEngine === 'stock_125') { txt = "<b>Топливо:</b> Родной PZ 19. Стабильный сток."; }
            else { txt = "Мотор изменен. Требует настройки."; speed = 110; torque = 80; }
            document.getElementById('val-speed').innerText = `~${speed} км/ч`;
            document.getElementById('bar-speed').style.width = (speed/140)*100 + '%';
            document.getElementById('config-desc').innerHTML = txt;
        }
        recalculate();
    </script>
</body>
</html>
