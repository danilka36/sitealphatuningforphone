<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA GS CONFIGURATOR // MOBILE FIX</title>
    <style>
        :root {
            --bg-garage: #121110;      
            --panel-bg: rgba(25, 23, 22, 0.95); 
            --accent-dark: #fff;   
            --accent-coffee: #a89282; 
            --text-main: #e0d8d3;     
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-garage);
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ЗОНА С МОПЕДОМ (ТЕПЕРЬ СТРОГО ФИКСИРОВАННАЯ ВЕРТИКАЛЬНАЯ СТРУКТУРА) */
        .bike-stage {
            width: 100%;
            height: 35vh; /* Ограничиваем высоту картинки, чтобы не жрала весь экран */
            background: linear-gradient(to bottom, #1a1817, var(--bg-garage));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(168, 146, 130, 0.15);
        }

        .stage-header h1 {
            font-size: 1em;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent-dark);
            text-align: center;
            text-transform: uppercase;
        }

        #display-engine-name {
            font-size: 0.75em;
            color: var(--accent-coffee);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            margin-top: 2px;
        }

        .images-container {
            position: relative;
            width: 100%;
            height: 140px; /* Ужали высоту под экран телефона */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .bike-layer {
            position: absolute;
            max-width: 85%;
            max-height: 100%;
            object-fit: contain;
        }

        #layer-body {
            z-index: 3;
            transition: filter 0.3s ease;
        }
        #layer-base { z-index: 2; }


        /* ЕДИНАЯ СТРОГАЯ КОЛОНКА ТЮНИНГА СНИЗУ */
        .scroll-panel {
            width: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column; /* Никаких боковых столбов, только сверху вниз! */
            gap: 15px;
            background: var(--bg-garage);
        }

        .section-block {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid rgba(168, 146, 130, 0.15);
            border-radius: 16px;
            padding: 14px;
        }

        .section-subtitle {
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-coffee);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Удобный горизонтальный скролл кнопок (листаются пальцем влево-вправо внутри блока) */
        .horizontal-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .horizontal-scroll::-webkit-scrollbar {
            height: 2px;
        }

        .btn-tuning {
            flex: 0 0 auto; /* Не дает кнопкам сжиматься в сопли */
            background: #1f1d1c;
            border: 1px solid rgba(168, 146, 130, 0.15);
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8em;
            color: var(--text-main);
        }

        .btn-tuning.active {
            background: var(--accent-coffee);
            color: #000;
            border-color: var(--accent-coffee);
        }

        /* Компактный список движков */
        .engine-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-engine {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: #1f1d1c;
            border: 1px solid rgba(168, 146, 130, 0.15);
            border-radius: 10px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.8em;
        }

        .btn-engine.active {
            background: var(--accent-coffee);
            color: #000;
            border-color: var(--accent-coffee);
        }

        .btn-engine .engine-brand {
            font-size: 0.7em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Кружки цветов */
        .color-picker-grid {
            display: flex;
            gap: 12px;
        }

        .btn-color {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
        }

        .btn-color.active {
            border-color: #fff;
        }

        /* Статы */
        .stat-group {
            margin-bottom: 10px;
        }

        .stat-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .stat-value {
            color: var(--accent-dark);
            font-weight: 800;
        }

        .bar-container {
            width: 100%;
            height: 5px;
            background: rgba(168, 146, 130, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-coffee);
            width: 50%;
            transition: width 0.3s ease;
        }

        .info-box {
            background: rgba(31, 29, 28, 0.6);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.75em;
            line-height: 1.4;
            color: #c4b9b0;
            border-left: 3px solid var(--accent-coffee);
        }
    </style>
</head>
<body>

    <!-- ВЕРХ: КАРТИНКА И НАЗВАНИЕ -->
    <div class="bike-stage">
        <div class="stage-header">
            <h1>ALPHA GS GARAGE</h1>
            <div id="display-engine-name">Сток 125cc</div>
        </div>

        <div class="images-container">
            <img src="alpha_base.png" id="layer-base" class="bike-layer" alt="Alpha Base">
            <img src="alpha_body.png" id="layer-body" class="bike-layer" alt="Alpha Body">
        </div>
    </div>

    <!-- НИЗ: ВСЕ НАСТРОЙКИ СТРОГО В ОДИН СТОЛБЕЦ -->
    <div class="scroll-panel">
        
        <!-- ХАРАКТЕРИСТИКИ -->
        <div class="section-block">
            <div class="stat-group">
                <div class="stat-label-row">
                    <div>Скорость</div>
                    <div class="stat-value" id="val-speed">~85 км/ч</div>
                </div>
                <div class="bar-container"><div class="bar-fill" id="bar-speed"></div></div>
            </div>
            <div class="stat-group" style="margin-bottom: 12px;">
                <div class="stat-label-row">
                    <div>Подрыв / Момент</div>
                    <div class="stat-value" id="val-torque">Средняя</div>
                </div>
                <div class="bar-container"><div class="bar-fill" id="bar-torque"></div></div>
            </div>
            <div class="info-box" id="config-desc">Загрузка данных...</div>
        </div>

        <!-- ВЫБОР ЦВЕТА -->
        <div class="section-block">
            <div class="section-subtitle">Цвет пластика и бака</div>
            <div class="color-picker-grid">
                <button class="btn-color active" style="background: #801818;" onclick="changeBodyColor('none', this)"></button>
                <button class="btn-color" style="background: #facc15;" onclick="changeBodyColor('hue-rotate(300deg) saturate(2.5) brightness(1.2)', this)"></button>
                <button class="btn-color" style="background: #1d4ed8;" onclick="changeBodyColor('hue-rotate(190deg) saturate(1.8)', this)"></button>
                <button class="btn-color" style="background: #1a1a1a;" onclick="changeBodyColor('grayscale(1) brightness(0.3)', this)"></button>
            </div>
        </div>

        <!-- ДВИГАТЕЛИ -->
        <div class="section-block">
            <div class="section-subtitle">Выбор мотора (Свап)</div>
            <div class="engine-list">
                <button class="btn-engine active" onclick="setEngine('stock_125', this)">
                    <span>Сток 125cc</span> <span class="engine-brand">Alpha</span>
                </button>
                <button class="btn-engine" onclick="setEngine('zongshen_140', this)">
                    <span>Zongshen 140cc</span> <span class="engine-brand">ZS-Power</span>
                </button>
                <button class="btn-engine" onclick="setEngine('daytona_140', this)">
                    <span>Daytona 140cc</span> <span class="engine-brand">Anima Spec</span>
                </button>
                <button class="btn-engine" onclick="setEngine('zongshen_190', this)">
                    <span>Zongshen 190cc</span> <span class="engine-brand">ZS 1P62YML</span>
                </button>
                <button class="btn-engine" onclick="setEngine('daytona_190', this)">
                    <span>Daytona 190cc</span> <span class="engine-brand">Anima 4V</span>
                </button>
            </div>
        </div>

        <!-- КАРБЮРАТОР -->
        <div class="section-block">
            <div class="section-subtitle">Карбюратор (Диффузор)</div>
            <div class="horizontal-scroll">
                <button class="btn-tuning carb-btn active" onclick="setCarb(19)">PZ 19</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(22)">PZ 22</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(24)">PZ 24</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(26)">PZ 26</button>
                <button class="btn-tuning carb-btn" onclick="setCarb(27)">PZ 27</button>
            </div>
        </div>

        <!-- ЗВЕЗДЫ ПЕРЕДНИЕ -->
        <div class="section-block">
            <div class="section-subtitle">Ведущая звезда</div>
            <div class="horizontal-scroll">
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(13)">13T</button>
                <button class="btn-tuning front-sprocket-btn active" onclick="setFrontSprocket(14)">14T</button>
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(15)">15T</button>
                <button class="btn-tuning front-sprocket-btn" onclick="setFrontSprocket(16)">16T</button>
            </div>
        </div>

        <!-- ЗВЕЗДЫ ЗАДНИЕ -->
        <div class="section-block">
            <div class="section-subtitle">Ведомая звезда</div>
            <div class="horizontal-scroll">
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(36)">36T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(37)">37T</button>
                <button class="btn-tuning rear-sprocket-btn active" onclick="setRearSprocket(38)">38T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(39)">39T</button>
                <button class="btn-tuning rear-sprocket-btn" onclick="setRearSprocket(40)">40T</button>
            </div>
        </div>

        <!-- РЕЗИНА -->
        <div class="section-block">
            <div class="section-subtitle">Покрышки</div>
            <div class="horizontal-scroll">
                <button class="btn-tuning tires-btn active" onclick="setTires('stock')">Сток (Шипы)</button>
                <button class="btn-tuning tires-btn" onclick="setTires('road')">Слики (Дорожные)</button>
            </div>
        </div>

        <!-- ВЫХЛОП -->
        <div class="section-block">
            <div class="section-subtitle">Выхлопная система</div>
            <div class="horizontal-scroll">
                <button class="btn-tuning exhaust-btn active" onclick="setExhaust('stock')">Сток глушитель</button>
                <button class="btn-tuning exhaust-btn" onclick="setExhaust('akrapovic')">Akrapovič</button>
                <button class="btn-tuning exhaust-btn" onclick="setExhaust('sc_project')">SC Project</button>
            </div>
        </div>

    </div>

    <script>
        let currentEngine = 'stock_125';
        let frontSprocket = 14;
        let rearSprocket = 38;
        let currentCarb = 19;
        let currentTires = 'stock';
        let currentExhaust = 'stock';

        const wrenchAudio = new Audio('гайковерт.MP3');

        function playWrenchSound() {
            wrenchAudio.currentTime = 0;
            wrenchAudio.play().catch(e => console.log(e));
        }

        function changeBodyColor(filterValue, element) {
            playWrenchSound();
            document.getElementById('layer-body').style.filter = filterValue;
            document.querySelectorAll('.btn-color').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function setEngine(engineType, element) {
            playWrenchSound();
            currentEngine = engineType;
            document.querySelectorAll('.btn-engine').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            let names = {
                'stock_125': 'Сток 125cc',
                'zongshen_140': 'Zongshen 140cc',
                'daytona_140': 'Daytona 140cc',
                'zongshen_190': 'Zongshen 190cc',
                'daytona_190': 'Daytona 190cc'
            };
            document.getElementById('display-engine-name').innerText = names[engineType];
            recalculate();
        }

        function setCarb(size) {
            playWrenchSound();
            currentCarb = size;
            updateUI('.carb-btn', 'PZ ' + size);
            recalculate();
        }

        function setFrontSprocket(teeth) {
            playWrenchSound();
            frontSprocket = teeth;
            updateUI('.front-sprocket-btn', teeth + 'T');
            recalculate();
        }

        function setRearSprocket(teeth) {
            playWrenchSound();
            rearSprocket = teeth;
            updateUI('.rear-sprocket-btn', teeth + 'T');
            recalculate();
        }

        function setTires(type) {
            playWrenchSound();
            currentTires = type;
            updateUI('.tires-btn', type === 'stock' ? 'Сток (Шипы)' : 'Слики (Дорожные)');
            recalculate();
        }

        function setExhaust(brand) {
            playWrenchSound();
            currentExhaust = brand;
            let targetText = 'Сток глушитель';
            if (brand === 'akrapovic') targetText = 'Akrapovič';
            if (brand === 'sc_project') targetText = 'SC Project';
            updateUI('.exhaust-btn', targetText);
            recalculate();
        }

        function updateUI(className, activeText) {
            document.querySelectorAll(className).forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === activeText) btn.classList.add('active');
            });
        }

        function recalculate() {
            let baseSpeed = 85;
            let baseTorque = 55; 
            let descParts = [];

            switch(currentEngine) {
                case 'stock_125': baseSpeed = 85; baseTorque = 55; break;
                case 'zongshen_140': baseSpeed = 100; baseTorque = 75; break;
                case 'daytona_140': baseSpeed = 105; baseTorque = 70; break;
                case 'zongshen_190': baseSpeed = 115; baseTorque = 95; break;
                case 'daytona_190': baseSpeed = 125; baseTorque = 90; break;
            }

            if (currentEngine === 'stock_125') {
                if (currentCarb === 19) {
                    descParts.push("<b>Топливо:</b> Сток карб 19. Стабильный запуск, ровный холостой ход.");
                } else if (currentCarb === 22) {
                    baseSpeed += 4; baseTorque += 2;
                    descParts.push("<b>Топливо:</b> Карб 22. Мотору полегче дышать на верхах, чуть прибавилось динамики.");
                } else if (currentCarb === 24) {
                    baseSpeed += 2; baseTorque -= 4;
                    descParts.push("<b>Топливо:</b> Карб 24. Многовато для стока, на низких оборотах при резком газе может затухать.");
                } else if (currentCarb >= 26) {
                    baseSpeed -= 12; baseTorque -= 20;
                    descParts.push("<b>Топливо:</b> Диффузор огромный! Заливает свечу, мопед захлебывается, тяги нет.");
                }
            } 
            else if (currentEngine.includes('140')) {
                if (currentCarb <= 19) {
                    baseSpeed -= 8; baseTorque -= 10;
                    descParts.push("<b>Топливо:</b> 19-й карб жестко душит 140 кубов. Верха полностью пропали.");
                } else if (currentCarb === 24) {
                    baseSpeed += 5; baseTorque += 5;
                    descParts.push("<b>Топливо:</b> 24-й диффузор — идеальный конфиг под 140сс. Отличная продувка.");
                } else {
                    descParts.push("<b>Топливо:</b> Конфиг рабочий, но требует точной настройки жиклеров.");
                }
            } 
            else if (currentEngine.includes('190')) {
                if (currentCarb <= 22) {
                    baseSpeed -= 20; baseTorque -= 25;
                    descParts.push("<b>Топливо:</b> Двигатель голодает! Маленький карб полностью убивает потенциал 190 кубов.");
                } else if (currentCarb >= 26) {
                    baseSpeed += 12; baseTorque += 15;
                    descParts.push("<b>Топливо:</b> Полный разрыв! 26-27мм раскрывают мотор на 100%. Бешеный подрыв.");
                } else {
                    descParts.push("<b>Топливо:</b> Нормальный средний ход, едет уверенно.");
                }
            }

            const currentRatio = rearSprocket / frontSprocket;
            const stockRatio = 38 / 14;
            const ratioDifference = currentRatio - stockRatio;

            let sprocketSpeedModifier = 35;
            if (currentEngine.includes('190')) sprocketSpeedModifier = 45;

            baseSpeed -= ratioDifference * sprocketSpeedModifier;
            baseTorque += ratioDifference * 65;

            if (currentTires === 'road') baseSpeed += 4;
            if (currentExhaust === 'akrapovic') { baseTorque += 6; baseSpeed += 3; } 
            else if (currentExhaust === 'sc_project') { baseTorque += 10; baseSpeed += 1; }

            let torqueLabel = "Средняя";
            if (baseTorque > 95) torqueLabel = "Избыточная (В космос)";
            else if (baseTorque > 78) torqueLabel = "Сумасшедшая (В угол)";
            else if (baseTorque > 60) torqueLabel = "Бодрая";
            else if (baseTorque < 35) torqueLabel = "Захлёб / Провал";

            let speedPercent = Math.min(Math.max((baseSpeed / 140) * 100, 10), 100); 
            let torquePercent = Math.min(Math.max(baseTorque, 10), 100);

            let finalSpeed = Math.round(baseSpeed);
            document.getElementById('val-speed').innerText = `~${finalSpeed - 3} - ${finalSpeed + 3} км/ч`;
            document.getElementById('val-torque').innerText = torqueLabel;
            document.getElementById('bar-speed').style.width = speedPercent + '%';
            document.getElementById('bar-torque').style.width = torquePercent + '%';
            
            document.getElementById('config-desc').innerHTML = descParts.join('<br><br>');
        }

        recalculate();
    </script>
</body>
</html>
